name: Decision OS Autonomous Run

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-decision-os:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Decision OS cycle
        run: node scripts/decision-runner.js

      - name: Commit updated dashboard data
        run: |
          git config user.name "Decision OS Bot"
          git config user.email "actions@github.com"
          git add data/status.json reports/
          git commit -m "Run autonomous Decision OS cycle" || echo "No changes to commit"
          git push
